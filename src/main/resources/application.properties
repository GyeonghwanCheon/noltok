spring.application.name=noltok
spring.datasource.driver-class-name=${DB_DRIVER}
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate

# JPA
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false

# Flyway
# baseline-on-migrate: 기존 ddl-auto=update로 쌓인 로컬 DB처럼 이미
# 스키마가 있는 환경에서는 V1을 실제로 실행하지 않고 "이미 적용된 것"으로만
# 표시(baseline-version=1) → V2부터 실제 적용. 완전히 빈 DB에서는 V1부터
# 전부 실제 실행됨 (docs/decision-log.md 참고)
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

# JWT
jwt.secret=${JWT_SECRET}
jwt.access-expiration=${JWT_ACCESS_EXPIRATION}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}

# Redis
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}

# MinIO
minio.root-user=${MINIO_ROOT_USER}
minio.root-password=${MINIO_ROOT_PASSWORD}
minio.endpoint=${MINIO_ENDPOINT}
minio.bucket=${MINIO_BUCKET}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB