services:
  mysql:
    image: mysql:8.0
    container_name: noltok-mysql
    ports:
      - "3306:3306"
    environment:
      # DB_USERNAME이 root라서 MYSQL_USER는 따로 설정 안 함 (root로 지정하면
      # 공식 이미지 entrypoint가 에러를 냄) — DB_PASSWORD를 그대로 root 비밀번호로 재사용
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: noltok
    volumes:
      - mysql_data:/var/lib/mysql

  kafka:
    image: apache/kafka:3.7.0
    container_name: noltok-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data

  minio:
    image: minio/minio:latest
    container_name: noltok-minio
    ports:
      - "9000:9000"   # S3 호환 API
      - "9001:9001"   # 관리 콘솔
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis:7-alpine
    container_name: noltok-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  kafka_data:
  minio_data:
  redis_data:
