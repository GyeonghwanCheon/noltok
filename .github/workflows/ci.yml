name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    # docker-compose.prod.yml/application.properties가 요구하는 값 —
    # 실제 운영 값이 아니라 CI 전용 값. 비밀번호/키류만 리포지토리
    # Secrets로 등록하고, 나머지(호스트/포트/버킷명 등)는 민감정보가
    # 아니라 그냥 리터럴로 둠 (docs/decision-log.md 참고)
    env:
      DB_DRIVER: com.mysql.cj.jdbc.Driver
      DB_URL: jdbc:mysql://localhost:3306/noltok
      DB_USERNAME: root
      DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
      JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
      JWT_ACCESS_EXPIRATION: "1800000"
      JWT_REFRESH_EXPIRATION: "604800000"
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      MINIO_ROOT_USER: ${{ secrets.CI_MINIO_ROOT_USER }}
      MINIO_ROOT_PASSWORD: ${{ secrets.CI_MINIO_ROOT_PASSWORD }}
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_BUCKET: noltok

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle 캐시
        uses: gradle/actions/setup-gradle@v4

      - name: gradlew 실행 권한 부여
        run: chmod +x gradlew

      # docker-compose.prod.yml 재사용 — 로컬에서 이미 검증한 그 파일
      # 그대로 (2026-07-14 Docker Compose 운영 환경 설정 작업 참고)
      - name: 인프라 컨테이너 기동 (MySQL/Kafka/Redis/MinIO)
        run: docker compose -f docker-compose.prod.yml up -d

      - name: MySQL 준비될 때까지 대기
        run: |
          for i in $(seq 1 30); do
            if docker exec noltok-mysql mysqladmin ping -h127.0.0.1 --silent 2>/dev/null; then
              echo "MySQL ready after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "MySQL이 준비 시간 내에 뜨지 않았습니다"
          exit 1

      - name: 테스트 실행
        run: ./gradlew test

      - name: 테스트 리포트 업로드 (실패 시)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/test/
